<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Manager</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <h1><i class="fas fa-utensils"></i> Recipe Manager</h1>
        <p>All your delicious recipes!</p>
      </header>

      <div class="search-container">
        <input
          type="text"
          id="search-input"
          placeholder="Search for recipes..."
        />
        <button id="search-btn">Search</button>
      </div>

      <!-- Hidden by default, only shown if recipe not found -->
      <div id="error-container" class="hidden">
        <p>No matching recipes found. Try another search term!</p>
      </div>

      <div id="result-heading"></div>

      <div id="recipes" class="recipes-container"></div>

      <!-- Hidden by default, only shown if user clicks on a recipe within "recipes-container" -->
      <div id="recipe-details" class="hidden">
        <button id="back-btn">
          <i class="fas fa-arrow-left"></i> Back to recipes
        </button>
        <div id="recipe-details-content"></div>
      </div>

      <script src="app.js"></script>
    </div>
  </body>
</html>
